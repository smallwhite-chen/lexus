<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NX Wireframe · 重點段落版面探索</title>
<link rel="stylesheet" href="ds/lexus-wf-design-system-ea4c01b0-b28f-42a4-b83b-cb4ba2249a35/styles.css" />
<link rel="stylesheet" href="nx-assets/nx.css" />
<style>
  body { margin: 0; }
  /* mini-frame helpers for exploration artboards */
  .ex { padding: 16px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; background: var(--wf-paper); }
  .ex__t { display: flex; flex-direction: column; gap: 3px; }
  .ex__t b { font-size: 14px; }
  .ex__note { font-family: var(--wf-mono); font-size: 10.5px; color: var(--wf-muted); line-height: 1.5; }
  .ex .wf-img { min-height: 0; }
  .ex-pick { align-self: flex-start; }
  .mini-card { border: 1px solid var(--wf-line); border-radius: var(--wf-r); overflow: hidden; display: flex; flex-direction: column; }
  .mini-card .wf-img { border-radius: 0; border-left: 0; border-right: 0; border-top: 0; }
  .mini-card__b { padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; }
  .mini-card__b b { font-size: 12px; }
  .mini-row { display: flex; gap: 8px; align-items: center; }
  .mini-btn { font-family: var(--wf-mono); font-size: 10px; border: 1px solid var(--wf-line); border-radius: var(--wf-r); padding: 4px 8px; color: var(--wf-ink-2); }
  .mini-btn--solid { background: var(--wf-accent); color: #fff; border-color: var(--wf-accent); }
  .thumb-strip { display: flex; gap: 6px; }
  .thumb-strip .t { flex: 1; aspect-ratio: 1; border: 1px solid var(--wf-line); border-radius: 2px; background: var(--wf-fill); }
  .thumb-strip .t.on { border-color: var(--wf-accent); border-width: 2px; }
  .seg { display: flex; border: 1px solid var(--wf-line); border-radius: var(--wf-r-pill); overflow: hidden; }
  .seg span { flex: 1; text-align: center; font-size: 11px; padding: 7px 4px; color: var(--wf-ink-2); }
  .seg span.on { background: var(--wf-accent); color: #fff; }
  .phone { border: 1px solid var(--wf-line-strong); border-radius: 14px; overflow: hidden; position: relative; height: 100%; display: flex; flex-direction: column; background: var(--wf-paper); }
  .phone__body { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
  .phone__line { height: 9px; border-radius: 2px; background: var(--wf-fill); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .specmini { border: 1px solid var(--wf-line); border-radius: var(--wf-r); overflow: hidden; font-size: 11px; }
  .specmini .r { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 6px; padding: 7px 9px; border-bottom: 1px solid var(--wf-line-2); }
  .specmini .r:last-child { border-bottom: 0; }
  .specmini .r.h { background: var(--wf-fill); font-family: var(--wf-mono); font-size: 9.5px; color: var(--wf-muted); }
  .specmini .r.d { background: rgba(43,59,80,.05); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="nx-assets/design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const H = ({ html }) => <div className="ex" dangerouslySetInnerHTML={{ __html: html }} />;
const pick = '<span class="wf-tag wf-tag--solid ex-pick">主頁採用</span>';
const img = (l, r) => '<div class="wf-img" style="aspect-ratio:' + (r || '16/10') + '"><span class="wf-img__label">' + l + '</span></div>';

/* ---------- 特色 Carousel 呈現 ---------- */
const carPeek =
  '<div class="ex__t"><b>A · 卡片露邊 peek</b></div>' + pick +
  '<div style="display:flex;gap:8px;overflow:hidden">' +
    '<div class="mini-card" style="flex:0 0 72%">' + img('FEATURE', '4/3') +
      '<div class="mini-card__b"><b>紡錘形水箱護罩</b><span class="ex__note">無邊際格柵設計</span>' +
      '<div class="mini-row"><span class="mini-btn mini-btn--solid">查看更詳細</span><span class="mini-btn">▶</span></div></div></div>' +
    '<div class="mini-card" style="flex:0 0 22%">' + img('NEXT', '3/5') + '</div>' +
  '</div>' +
  '<div class="mini-row" style="justify-content:space-between"><div class="wf-arrows"><button>‹</button><button>›</button></div>' +
  '<div class="mini-row"><span style="font-family:var(--wf-mono);font-size:11px">1 / 7</span>' +
  '<div class="wf-dots"><i aria-current="true"></i><i></i><i></i><i></i></div></div></div>' +
  '<span class="ex__note">// 全部「更多」訊號：箭頭＋計數＋dots＋露邊＋可滑動</span>';

const carThumb =
  '<div class="ex__t"><b>B · 全幅單張 ＋ 縮圖列</b></div>' +
  '<div class="mini-card">' + img('FEATURE 全幅', '16/10') +
    '<div class="mini-card__b"><b>鏡頭式 LED 頭燈</b><span class="ex__note">三眼鏡頭式投射</span>' +
    '<div class="mini-row"><span class="mini-btn mini-btn--solid">查看更詳細</span></div></div></div>' +
  '<div class="thumb-strip"><div class="t on"></div><div class="t"></div><div class="t"></div><div class="t"></div><div class="t"></div></div>' +
  '<div class="mini-row" style="justify-content:space-between"><span style="font-family:var(--wf-mono);font-size:11px">02 / 07</span>' +
  '<div class="wf-arrows"><button>‹</button><button>›</button></div></div>' +
  '<span class="ex__note">// 縮圖即導覽，可直接跳項；適合圖像強的分類</span>';

const carList =
  '<div class="ex__t"><b>C · 垂直清單（無輪播）</b></div>' +
  ['紡錘形水箱護罩', '鏡頭式 LED 頭燈', '貫穿式 LED 尾燈'].map(t =>
    '<div class="mini-card" style="flex-direction:row;align-items:stretch">' +
    '<div class="wf-img" style="width:38%;aspect-ratio:4/3"><span class="wf-img__label">IMG</span></div>' +
    '<div class="mini-card__b" style="flex:1;justify-content:center"><b>' + t + '</b><span class="mini-btn" style="align-self:flex-start">查看更詳細 ›</span></div></div>'
  ).join('') +
  '<span class="ex__note">// 無左右切換，一覽到底；最低互動成本、利於 SEO</span>';

/* ---------- 360 兩層切換配置 ---------- */
const seg = (a, b, on) => '<div class="seg"><span class="' + (on === 0 ? 'on' : '') + '">' + a + '</span><span class="' + (on === 1 ? 'on' : '') + '">' + b + '</span></div>';
const sw = n => '<div class="wf-swatches">' + Array.from({ length: n }).map((_, i) => '<span class="wf-swatch"' + (i === 0 ? ' aria-current="true"' : '') + ' style="background:hsl(210 8% ' + (88 - i * 12) + '%)"></span>').join('') + '</div>';

const tsTop =
  '<div class="ex__t"><b>A · 上方分頁 ＋ 下方色票</b></div>' + pick +
  seg('外觀', '內裝', 0) + img('360° VIEWER ↔', '16/10') +
  '<div style="display:flex;justify-content:center">' + sw(6) + '</div>' +
  '<span class="ex__note">// 兩層垂直堆疊，動線單純，手機友善</span>';

const tsRail =
  '<div class="ex__t"><b>B · 左側垂直 rail ＋ 檢視器</b></div>' +
  '<div style="display:flex;gap:8px;flex:1">' +
    '<div style="display:flex;flex-direction:column;gap:6px;width:64px">' +
      '<span class="mini-btn mini-btn--solid" style="text-align:center">外觀</span>' +
      '<span class="mini-btn" style="text-align:center">內裝</span></div>' +
    '<div style="flex:1;display:flex;flex-direction:column;gap:8px">' + img('360° ↔', '4/3') +
    '<div style="display:flex;justify-content:center">' + sw(5) + '</div></div>' +
  '</div>' +
  '<span class="ex__note">// 分類常駐側欄，桌機切換更快；手機需收合</span>';

const tsDual =
  '<div class="ex__t"><b>C · 並列雙段（不藏於車色下）</b></div>' +
  img('360° 外觀 ↔', '16/9') +
  '<div><span class="wf-eyebrow">外觀色</span>' + sw(6) + '</div>' +
  '<div><span class="wf-eyebrow">內裝色</span>' + sw(4) + '</div>' +
  '<span class="ex__note">// 外觀／內裝色並排同屏，強調並列關係</span>';

/* ---------- 規格 / 配備表 ---------- */
const specCols =
  '<div class="ex__t"><b>A · 對照欄表格 ＋ 僅顯示差異</b></div>' + pick +
  '<div class="mini-row" style="justify-content:flex-end"><span class="mini-btn">僅顯示差異 ⬤</span></div>' +
  '<div class="specmini"><div class="r h"><span>車款</span><span>450h+</span><span>350h</span></div>' +
  '<div class="r"><span>售價（萬）</span><span>284.5</span><span>257.5</span></div>' +
  '<div class="r d"><span>動力 ●</span><span>PHEV</span><span>HEV</span></div>' +
  '<div class="r d"><span>馬力 ●</span><span>309</span><span>243</span></div>' +
  '<div class="r"><span>進階 ▾ 尺寸</span><span></span><span></span></div></div>' +
  '<span class="ex__note">// 差異列標記＋進階可收合，降低素人壓力</span>';

const specCards =
  '<div class="ex__t"><b>B · 卡片式（每等級一卡）</b></div>' +
  '<div class="grid2">' +
  ['450h+ F SPORT', '350h 旗艦'].map(g =>
    '<div class="mini-card"><div class="mini-card__b"><b style="font-size:11px">' + g + '</b>' +
    '<span class="ex__note">PHEV · 309 PS</span><span class="ex__note">售價 284.5 萬</span>' +
    '<span class="ex__note">純電 76 km</span></div></div>'
  ).join('') + '</div>' +
  '<span class="ex__note">// 適合手機；每卡自成單位，免橫向比對</span>';

const equipTab =
  '<div class="ex__t"><b>C · 配備：分頁 vs accordion</b></div>' +
  '<div class="wf-tabs" style="font-size:11px"><span class="wf-tab" aria-selected="true" style="padding:8px 10px;font-size:11px">外觀</span><span class="wf-tab" style="padding:8px 10px;font-size:11px">內裝</span><span class="wf-tab" style="padding:8px 10px;font-size:11px">安全</span></div>' +
  '<div class="grid2"><div class="mini-card"><div class="mini-card__b"><b style="font-size:11px">LED 頭燈</b></div></div>' +
  '<div class="mini-card"><div class="mini-card__b"><b style="font-size:11px">21" 鋁圈</b></div></div></div>' +
  '<div class="mini-card" style="flex-direction:row;justify-content:space-between"><div class="mini-card__b"><b style="font-size:11px">內裝（accordion）</b></div><span style="padding:8px 10px">▾</span></div>' +
  '<span class="ex__note">// 主頁用 accordion；分頁適合分類少、項目多時</span>';

/* ---------- FAB 形態 ---------- */
const phone = (bodyExtra, fab) =>
  '<div class="phone"><div style="height:34px;border-bottom:1px solid var(--wf-line);display:flex;align-items:center;padding:0 10px;gap:6px"><span class="mini-btn">☰</span><span class="mini-btn">LOGO</span></div>' +
  '<div class="phone__body"><div class="phone__line" style="width:60%;height:14px"></div>' + img('CONTENT', '16/10') +
  '<div class="phone__line"></div><div class="phone__line" style="width:80%"></div>' + (bodyExtra || '') + '</div>' + fab + '</div>';

const fabBar =
  '<div class="ex__t"><b>A · 固定底部三等分 bar</b></div>' + pick +
  phone('', '<div class="nx-fab" style="position:relative"><button class="nx-fab__btn" style="font-size:11px"><span class="ic">％</span>優惠</button><button class="nx-fab__btn nx-fab__btn--primary" style="font-size:11px"><span class="ic">▦</span>試乘</button><button class="nx-fab__btn" style="font-size:11px"><span class="ic">◎</span>據點</button></div>') +
  '<span class="ex__note">// 三項永遠可見，零點擊成本</span>';

const fabExpand =
  '<div class="ex__t"><b>B · 單一主鈕 ＋ 展開三項</b></div>' +
  phone('<div style="position:absolute;right:14px;bottom:66px;display:flex;flex-direction:column;gap:6px;align-items:flex-end">' +
    '<span class="mini-btn mini-btn--solid">購車優惠</span><span class="mini-btn mini-btn--solid">預約試乘</span><span class="mini-btn mini-btn--solid">據點查詢</span></div>',
    '<div style="position:absolute;right:14px;bottom:14px;width:52px;height:52px;border-radius:50%;background:var(--wf-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px">＋</div>') +
  '<span class="ex__note">// 收合為單鈕，省空間；多一次點擊</span>';

const fabSide =
  '<div class="ex__t"><b>C · 右側直立浮動三鈕</b></div>' +
  phone('<div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px">' +
    '<div style="width:44px;height:44px;border-radius:50%;border:1px solid var(--wf-line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px">優惠</div>' +
    '<div style="width:44px;height:44px;border-radius:50%;background:var(--wf-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px">試乘</div>' +
    '<div style="width:44px;height:44px;border-radius:50%;border:1px solid var(--wf-line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px">據點</div></div>', '') +
  '<span class="ex__note">// 不佔底部，但圖示需自明；命中區 44px</span>';

/* ---------- 重點比較卡片 ---------- */
const cmpScroll =
  '<div class="ex__t"><b>A · 水平捲動卡片</b></div>' + pick +
  '<div style="display:flex;gap:8px;overflow:hidden">' +
  ['F SPORT', '旗艦版'].map((g, i) =>
    '<div class="mini-card" style="flex:0 0 ' + (i ? '34%' : '60%') + '">' + img(g, '16/10') +
    '<div class="mini-card__b"><b style="font-size:11px">NX 450h+ ' + g + '</b><span class="ex__note">重點不同：21" 輪圈 · AVS</span></div></div>'
  ).join('') + '</div>' +
  '<div class="mini-row" style="justify-content:center"><div class="wf-dots"><i aria-current="true"></i><i></i><i></i></div></div>' +
  '<span class="ex__note">// 卡片露邊提示可滑；聚焦單卡重點</span>';

const cmpTable =
  '<div class="ex__t"><b>B · 並排固定對照表</b></div>' +
  '<div class="specmini"><div class="r h"><span></span><span>F SPORT</span><span>旗艦</span></div>' +
  '<div class="r"><span>動力</span><span>PHEV</span><span>HEV</span></div>' +
  '<div class="r"><span>輪圈</span><span>21"</span><span>20"</span></div>' +
  '<div class="r"><span>懸吊</span><span>AVS</span><span>—</span></div></div>' +
  '<span class="ex__note">// 一眼對齊比對；欄多時手機需橫捲</span>';

const cmpPk =
  '<div class="ex__t"><b>C · 兩台 PK 切換</b></div>' +
  '<div class="mini-row"><span class="mini-btn mini-btn--solid" style="flex:1;text-align:center">450h+ ▾</span><span style="font-family:var(--wf-mono)">VS</span><span class="mini-btn mini-btn--solid" style="flex:1;text-align:center">350h ▾</span></div>' +
  '<div class="grid2">' + img('車型 A', '4/3') + img('車型 B', '4/3') + '</div>' +
  '<div class="specmini"><div class="r"><span>馬力</span><span>309</span><span>243</span></div><div class="r"><span>售價</span><span>284.5</span><span>257.5</span></div></div>' +
  '<span class="ex__note">// 使用者自選兩台對決，聚焦差異</span>';

function App() {
  return (
    <DesignCanvas>
      <DCSection id="carousel" title="特色 Carousel 呈現" subtitle="左右切換的三種做法">
        <DCArtboard id="car-a" label="A · 卡片露邊 peek" width={300} height={420}><H html={carPeek} /></DCArtboard>
        <DCArtboard id="car-b" label="B · 全幅 + 縮圖列" width={300} height={420}><H html={carThumb} /></DCArtboard>
        <DCArtboard id="car-c" label="C · 垂直清單" width={300} height={420}><H html={carList} /></DCArtboard>
      </DCSection>

      <DCSection id="ts360" title="360 賞車 · 兩層切換配置" subtitle="外觀/內裝 + 顏色 的擺放">
        <DCArtboard id="ts-a" label="A · 上分頁 + 下色票" width={300} height={400}><H html={tsTop} /></DCArtboard>
        <DCArtboard id="ts-b" label="B · 左 rail + 檢視器" width={300} height={400}><H html={tsRail} /></DCArtboard>
        <DCArtboard id="ts-c" label="C · 並列雙段" width={300} height={400}><H html={tsDual} /></DCArtboard>
      </DCSection>

      <DCSection id="tables" title="規格 / 配備表 呈現" subtitle="對照與壓力控管">
        <DCArtboard id="sp-a" label="A · 對照欄 + 差異 toggle" width={320} height={360}><H html={specCols} /></DCArtboard>
        <DCArtboard id="sp-b" label="B · 卡片式" width={320} height={360}><H html={specCards} /></DCArtboard>
        <DCArtboard id="sp-c" label="C · 配備 分頁/accordion" width={320} height={360}><H html={equipTab} /></DCArtboard>
      </DCSection>

      <DCSection id="fab" title="FAB 浮動操作 形態" subtitle="購車優惠 / 預約試乘 / 據點查詢">
        <DCArtboard id="fab-a" label="A · 底部三等分 bar" width={250} height={460}><H html={fabBar} /></DCArtboard>
        <DCArtboard id="fab-b" label="B · 單鈕展開" width={250} height={460}><H html={fabExpand} /></DCArtboard>
        <DCArtboard id="fab-c" label="C · 右側直立三鈕" width={250} height={460}><H html={fabSide} /></DCArtboard>
      </DCSection>

      <DCSection id="compare" title="重點比較卡片" subtitle="各等級差異呈現">
        <DCArtboard id="cmp-a" label="A · 水平捲動卡" width={320} height={360}><H html={cmpScroll} /></DCArtboard>
        <DCArtboard id="cmp-b" label="B · 並排對照表" width={320} height={360}><H html={cmpTable} /></DCArtboard>
        <DCArtboard id="cmp-c" label="C · 兩台 PK" width={320} height={360}><H html={cmpPk} /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
